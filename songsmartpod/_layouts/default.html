<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Podcast site featuring episodes, host bios, and more!">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/css/styles.css">
    <link rel="icon" href="{{ site.baseurl }}/images/songsmartpodlogo300.png">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo-container">
                    <a href="{{site.baseurl }}/">
                    <img src="{{ site.baseurl }}/images/songsmartpodlogo.png" alt="Podcast Logo">
                </a>
                </div>
                <div class="podcast-info">
                    <p class="strapline">{{ site.description }}</p>
                </div>
                <nav>
                    <a href="{{ site.baseurl }}/">Home</a>
                    <a href="{{ site.baseurl }}/episodes">Episodes</a>
                    <a href="{{ site.baseurl }}/about">About</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="https://open.spotify.com/show/4De887kWXBX8np0Df1SvqN" target="_blank" class="social-icon"><i class="fab fa-spotify"></i></a>
                <a href="https://instagram.com/songsmartpod" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                <a href="mailto:songsmartpod@gmail.com" class="social-icon"><i class="fas fa-envelope"></i></a>
            </div>
            <p>&copy; 2024 Song Smart Podcast. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</body>
</html>
